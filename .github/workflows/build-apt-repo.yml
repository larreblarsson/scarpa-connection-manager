name: Build and Publish APT Repo & PPA

on:
  push:
    tags:
      - '*'   # Run only when a tag is pushed (e.g. 1.2.1 or v1.2.1)

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v3

      - name: Install build dependencies
        run: |
          sudo apt-get update
          # Added 'dput' to the install list for Launchpad uploads
          sudo apt-get install -y devscripts build-essential debhelper \
            python3-all python3-gi gir1.2-gtk-3.0 gir1.2-vte-2.91 \
            gnupg apt-utils python3-paramiko dh-python dput

      - name: Check apt-ftparchive
        run: which apt-ftparchive && apt-ftparchive --version

      - name: Import GPG key
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

      # -----------------------------------------------------------------
      # NOTE: The "Bump Debian changelog version" step has been removed.
      # This ensures Launchpad uses your manually typed debian/changelog!
      # -----------------------------------------------------------------

      - name: Build Binary Package (For GitHub Pages & Releases)
        run: |
          dpkg-buildpackage -b -us -uc

      - name: Build Source Package (For Launchpad PPA)
        run: |
          dpkg-buildpackage -S -sa -us -uc
          
          # Extract the ID of the GPG key we just imported
          KEY_ID=$(gpg --list-secret-keys --with-colons | awk -F: '/^sec:/ {print $5}')
          echo "Using GPG Key ID: $KEY_ID"
          
          # Force debsign to use this specific key ID (-k"$KEY_ID")
          debsign -k"$KEY_ID" -p "gpg --batch --yes --pinentry-mode loopback --passphrase $GPG_PASSPHRASE" ../*source.changes
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Upload to Launchpad PPA
        run: |
          # dput automatically knows how to route to ppa.launchpad.net
          dput ppa:larre-b-larsson/scarpa-connection-manager ../*source.changes

      - name: Prepare APT repo (GitHub Pages)
        run: |
          REPO_DIR=repo
          CODENAME=stable
          PACKAGE_DEB=$(ls -t ../scarpa-connection-manager*.deb | head -n1)

          # Clean old repo contents
          rm -rf ${REPO_DIR}
          mkdir -p ${REPO_DIR}/pool
          mkdir -p ${REPO_DIR}/dists/${CODENAME}/main/binary-amd64
          mkdir -p ${REPO_DIR}/dists/${CODENAME}/main/binary-all

          cp ${PACKAGE_DEB} ${REPO_DIR}/pool/

          cd ${REPO_DIR}

          # Generate Packages for amd64
          apt-ftparchive packages pool > dists/${CODENAME}/main/binary-amd64/Packages
          gzip -c dists/${CODENAME}/main/binary-amd64/Packages > dists/${CODENAME}/main/binary-amd64/Packages.gz

          # Generate Packages for all
          apt-ftparchive packages pool > dists/${CODENAME}/main/binary-all/Packages
          gzip -c dists/${CODENAME}/main/binary-all/Packages > dists/${CODENAME}/main/binary-all/Packages.gz

          # --- FIX: Generate Release config on the fly ---
          cat << 'EOF' > apt-release.conf
          APT::FTPArchive::Release::Origin "Tomas Larsson";
          APT::FTPArchive::Release::Label "Scarpa Connection Manager";
          APT::FTPArchive::Release::Suite "stable";
          APT::FTPArchive::Release::Codename "stable";
          APT::FTPArchive::Release::Architectures "amd64 all";
          APT::FTPArchive::Release::Description "Scarpa Connection Manager Repository";
          EOF

          # Generate Release with the new config
          apt-ftparchive -c apt-release.conf release dists/${CODENAME} > dists/${CODENAME}/Release

          # Sign Release with loopback pinentry
          gpg --batch --yes --pinentry-mode loopback --passphrase "$GPG_PASSPHRASE" \
            --clearsign -o dists/${CODENAME}/InRelease dists/${CODENAME}/Release
          gpg --batch --yes --pinentry-mode loopback --passphrase "$GPG_PASSPHRASE" \
            --armor --detach-sign -o dists/${CODENAME}/Release.gpg dists/${CODENAME}/Release

          # Debug: show version in Packages
          grep Version dists/${CODENAME}/main/binary-amd64/Packages
          grep Version dists/${CODENAME}/main/binary-all/Packages
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: repo
          publish_branch: gh-pages
          force_orphan: true

      - name: Verify published Packages
        run: |
          curl -s https://larreblarsson.github.io/scarpa-connection-manager/dists/stable/main/binary-amd64/Packages | grep Version

      - name: Extract full changelog entry
        id: changelog
        run: |
          echo 'RELEASE_BODY<<EOF' >> $GITHUB_ENV
          dpkg-parsechangelog --count 1 >> $GITHUB_ENV
          echo 'EOF' >> $GITHUB_ENV

      - name: Create GitHub Release and upload .deb
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: scarpa-connection-manager ${{ github.ref_name }}
          body: ${{ env.RELEASE_BODY }}
          files: ../scarpa-connection-manager*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
